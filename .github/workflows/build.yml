name: build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  flipper-app:
    name: Build Flipper app (fap)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ufbt
        run: pip install --upgrade ufbt
      - name: Fetch Momentum SDK
        run: ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release --hw-target=f7
      - name: Build fap
        working-directory: flipper/hotspot-arcade
        run: ufbt
      - uses: actions/upload-artifact@v4
        with:
          name: hotspot-arcade-fap
          path: flipper/hotspot-arcade/dist/hotspot_arcade.fap

  web-bundle:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install web deps
        working-directory: web
        # Zero runtime deps (Node stdlib only); install only if a lockfile exists.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi
      - name: Build web bundle
        working-directory: web
        run: node build.mjs
      - uses: actions/upload-artifact@v4
        with:
          name: hotspot-arcade-web
          path: |
            web/dist/*.gz
            web/dist/manifest.json

  esp32-firmware:
    name: Build ESP32-S2 firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install arduino-cli
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh
          echo "$HOME/bin" >> "$GITHUB_PATH"
      - name: Install esp32 core
        run: |
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17
      - name: Compile firmware
        # AsyncTCP + ESPAsyncWebServer are vendored in esp32/libs/.
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s2:PartitionScheme=huge_app \
            --libraries esp32/libs \
            --output-dir esp32/hotspot-arcade-fw/build \
            esp32/hotspot-arcade-fw
      - uses: actions/upload-artifact@v4
        with:
          name: hotspot-arcade-firmware
          path: esp32/hotspot-arcade-fw/build/*.bin

  bundled-assets:
    # The fap ships the web bundle, trivia packs, and ESP firmware images as committed
    # build outputs (the app catalog builds flipper/hotspot-arcade/ alone and never runs
    # tools/build-fap.sh, so anything untracked is missing from the catalog's fap).
    # Nothing else notices when they go stale, and a stale bundle ships a broken app:
    # v0.2.0 released a fap with no firmware in it, and a later commit left v6 images in
    # a fap that required v7. This job is that missing alarm.
    name: Bundled assets are current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Web bundle matches assets/web
        # Compare the DECOMPRESSED bundle: zlib emits different bytes across platforms
        # and versions for identical input, so the .gz files themselves don't match
        # between a dev machine and this runner even when the content is the same.
        run: |
          cd web && node build.mjs && cd ..
          if ! cmp -s <(gunzip -c web/dist/index.html.gz) \
                      <(gunzip -c flipper/hotspot-arcade/assets/web/index.html.gz); then
            echo "::error::flipper/hotspot-arcade/assets/web/index.html.gz is stale. Run tools/build-fap.sh and commit the result."
            exit 1
          fi
          if ! cmp -s web/dist/manifest.json flipper/hotspot-arcade/assets/web/manifest.json; then
            echo "::error::flipper/hotspot-arcade/assets/web/manifest.json is stale. Run tools/build-fap.sh and commit the result."
            exit 1
          fi

      - name: Content packs match assets/packs
        run: |
          for pack in packs/*/*.txt; do
            bundled="flipper/hotspot-arcade/assets/packs/${pack#packs/}"
            if ! cmp -s "$pack" "$bundled"; then
              echo "::error::$bundled is stale or missing. Run tools/build-fap.sh and commit the result."
              exit 1
            fi
          done
          if [ "$(ls -1 packs/*/*.txt | wc -l)" != "$(ls -1 flipper/hotspot-arcade/assets/packs/*/*.txt | wc -l)" ]; then
            echo "::error::assets/packs has packs that packs/ doesn't. Run tools/build-fap.sh and commit the result."
            exit 1
          fi

      - name: ESP firmware images were built from the current sources
        # The images can't be diffed (ESP-IDF embeds a build timestamp), so compare a
        # hash of the sources that produced them. See tools/asset-stamp.sh.
        run: |
          recorded=$(cat flipper/hotspot-arcade/.bundled-fw.sha256 2>/dev/null || echo missing)
          current=$(tools/asset-stamp.sh)
          if [ "$recorded" != "$current" ]; then
            echo "::error::The ESP sources changed but flipper/hotspot-arcade/assets/firmware/ wasn't rebuilt (recorded $recorded, current $current). Run tools/build-fap.sh and commit the refreshed images."
            exit 1
          fi

  simulator:
    # Compile-only guard for the local simulator (sim/), which builds the REAL game
    # engine to WebAssembly. sim/engine/Arduino.h implements exactly the Arduino
    # surface ha_games.h uses TODAY; the first time the firmware gains a String
    # method or an ESP-IDF call, the simulator stops building. Without this job that
    # failure is silent until someone next tries to run it, possibly months later.
    # Compiling is the guard — the headless tests deliberately aren't run here.
    name: Simulator engine compiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 'latest' rather than a pin on purpose: the question this job answers is
      # "does the engine still build with a current toolchain", and the emcc flags
      # used (MODULARIZE / EXPORT_ES6 / EXPORTED_FUNCTIONS) have been stable for
      # years. If a future emscripten release breaks the build, that is a real
      # finding, not noise to be pinned away.
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest
          actions-cache-folder: emsdk-cache

      - name: Build the WASM engine
        run: sim/engine/build.sh

      - name: Confirm the build produced a loadable module
        # A zero-byte or missing artifact would otherwise pass as "compiled".
        run: |
          for f in sim/web/engine.js sim/web/engine.wasm; do
            if [ ! -s "$f" ]; then
              echo "::error::$f missing or empty after sim/engine/build.sh"
              exit 1
            fi
          done
          ls -l sim/web/engine.js sim/web/engine.wasm
