name: release

# Push a version tag (e.g. v0.1.0) to build all three parts and publish a
# GitHub Release with the Flipper fap, the web bundle, and the ESP32
# firmware images (S2, WROOM, C5) attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ESP build runs first, on the runner's system Python (which has pyserial
      # for the core's esptool elf2image step). A setup-python before this would
      # shadow it and break esptool with "No module named 'serial'".
      # AsyncTCP + ESPAsyncWebServer are vendored in esp32/libs/.
      - name: Build ESP32 firmware (all boards)
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh
          export PATH="$HOME/bin:$PATH"
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s2:PartitionScheme=huge_app \
            --libraries esp32/libs \
            --output-dir esp32/hotspot-arcade-fw/build \
            esp32/hotspot-arcade-fw
          # Merge the four flashable images into a single firmware-merged.bin
          # (flashable at 0x0), so the release ships one ESP image instead of four.
          BUILD=esp32/hotspot-arcade-fw/build
          BOOT_APP0="$HOME/.arduino15/packages/esp32/hardware/esp32/2.0.17/tools/partitions/boot_app0.bin"
          # The core ships esptool differently per platform: a standalone binary on
          # macOS, but on Linux "esptool" is the Python *package directory*, with the
          # entry point at esptool.py beside it. Resolve both, and fail loudly rather
          # than letting an unset command take the whole release down.
          ESPTOOL_DIR=$(ls -d "$HOME/.arduino15/packages/esp32/tools/esptool_py/"*/ 2>/dev/null | head -1)
          if [ -f "$ESPTOOL_DIR/esptool" ] && [ -x "$ESPTOOL_DIR/esptool" ]; then
            ESPTOOL="$ESPTOOL_DIR/esptool"
          elif [ -f "$ESPTOOL_DIR/esptool.py" ]; then
            ESPTOOL="python3 $ESPTOOL_DIR/esptool.py"
          else
            echo "esptool not found under $ESPTOOL_DIR"; ls -la "$ESPTOOL_DIR"; exit 1
          fi
          echo "Using esptool: $ESPTOOL"
          $ESPTOOL --chip esp32s2 merge_bin -o "$BUILD/firmware-merged.bin" \
            0x1000  "$BUILD/hotspot-arcade-fw.ino.bootloader.bin" \
            0x8000  "$BUILD/hotspot-arcade-fw.ino.partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BUILD/hotspot-arcade-fw.ino.bin"
          # Now the ESP32 WROOM board (plain esp32 FQBN, matching tools/build-fap.sh),
          # merged the same way into wroom-merged.bin so WROOM owners can also flash
          # from a computer instead of only on-device.
          WBUILD=esp32/hotspot-arcade-fw/build-wroom
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --libraries esp32/libs \
            --output-dir "$WBUILD" \
            esp32/hotspot-arcade-fw
          $ESPTOOL --chip esp32 merge_bin -o "$WBUILD/wroom-merged.bin" \
            0x1000  "$WBUILD/hotspot-arcade-fw.ino.bootloader.bin" \
            0x8000  "$WBUILD/hotspot-arcade-fw.ino.partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$WBUILD/hotspot-arcade-fw.ino.bin"
          # And the ESP32-C5. It needs a 3.x core (the chip does not exist in 2.0.17),
          # so it gets its own core install, its own boot_app0, and its own bootloader
          # offset (0x2000 on this chip, not 0x1000).
          #
          # NOTE: installing the 3.x core *replaces* esp32@2.0.17 and uninstalls its
          # esptool 4.5.1 (the one $ESPTOOL above points at), so we can no longer reuse
          # $ESPTOOL here. Rather than re-resolve a moving esptool, merge the images
          # ourselves: raw merge_bin is just each image placed at its flash offset with
          # 0xFF fill between them (verified byte-identical to esptool's output). This is
          # why the S2/WROOM merges run *before* this core install.
          arduino-cli core install esp32:esp32@3.3.11
          CBUILD=esp32/hotspot-arcade-fw/build-c5
          C5_CORE="$HOME/.arduino15/packages/esp32/hardware/esp32/3.3.11"
          C5_BOOT_APP0="$C5_CORE/tools/partitions/boot_app0.bin"
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c5:PartitionScheme=huge_app,CDCOnBoot=default \
            --libraries esp32/libs \
            --output-dir "$CBUILD" \
            esp32/hotspot-arcade-fw
          python3 - "$CBUILD/c5-merged.bin" \
            0x2000  "$CBUILD/hotspot-arcade-fw.ino.bootloader.bin" \
            0x8000  "$CBUILD/hotspot-arcade-fw.ino.partitions.bin" \
            0xe000  "$C5_BOOT_APP0" \
            0x10000 "$CBUILD/hotspot-arcade-fw.ino.bin" <<'PY'
          import sys
          out, pairs = sys.argv[1], sys.argv[2:]
          segs = []
          for i in range(0, len(pairs), 2):
              off = int(pairs[i], 0)
              with open(pairs[i + 1], 'rb') as f:
                  segs.append((off, f.read()))
          size = max(off + len(data) for off, data in segs)
          img = bytearray(b'\xff' * size)
          for off, data in segs:
              img[off:off + len(data)] = data
          with open(out, 'wb') as f:
              f.write(img)
          print("merged", out, len(img), "bytes")
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web bundle
        working-directory: web
        # Zero runtime deps (Node stdlib only); install only if a lockfile exists.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi
          node build.mjs
          cd dist && zip -9 ../web-bundle.zip index.html.gz manifest.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Flipper app (fap)
        run: |
          pip install --upgrade ufbt
          ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release --hw-target=f7
          cd flipper/hotspot-arcade && ufbt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Hotspot Arcade ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Offline multiplayer party games hosted from a Flipper Zero + ESP32-S2 dev board.

            ## Install

            **You only need `hotspot_arcade.fap`.** Drop it in `/ext/apps/GPIO/` on the SD card.
            The ESP firmware, the phone game bundle, and the content packs all ship inside it, so
            there is no SD setup and nothing else to download. Flash the board from the app itself
            with **Install Firmware**.

            > **First launch can take up to 3 minutes** (and again after an update). The .fap
            > carries about 3 MB of bundled content (three board firmwares, the phone game bundle,
            > the content packs) and the Flipper unpacks it to the SD card on first open. The
            > hourglass is the system loader doing that, not a hang, so give it a minute or two.
            > Every launch after that is instant.

            ## Assets

            - `hotspot_arcade.fap`: the whole thing. This is the one you want.
            - `firmware-merged.bin`: the ESP32-S2 firmware as a single image, if you'd rather flash
              that board from a computer (optional — the fap already carries it).
            - `wroom-merged.bin`: the same, for an ESP32 WROOM board (optional — the fap carries it too).
            - `c5-merged.bin`: the same, for an ESP32-C5 board.
            - `web-bundle.zip`: the phone game bundle on its own, for overriding the bundled client
              from `/ext/apps_data/hotspot_arcade/web/` (optional).

            ## Flash the ESP board from a computer (optional)

            Or skip this entirely and use **Install Firmware** on the Flipper — it flashes any of the boards.

            **ESP32-S2 dev board** — download mode: hold BOOT, tap RESET, release BOOT.
            **Never `--erase-all` on the S2.** Then tap RESET to run.

            ```sh
            esptool.py --chip esp32s2 --before default_reset --after hard_reset write_flash 0x0 firmware-merged.bin
            ```

            **ESP32 WROOM board:**

            ```sh
            esptool.py --chip esp32 --before default_reset --after hard_reset write_flash 0x0 wroom-merged.bin

            ESP32-C5:

            esptool.py --chip esp32c5 --before default_reset --after hard_reset write_flash 0x0 c5-merged.bin
            ```
          files: |
            flipper/hotspot-arcade/dist/hotspot_arcade.fap
            web/web-bundle.zip
            esp32/hotspot-arcade-fw/build/firmware-merged.bin
            esp32/hotspot-arcade-fw/build-wroom/wroom-merged.bin
            esp32/hotspot-arcade-fw/build-c5/c5-merged.bin
