name: release

# Push a version tag (e.g. v0.1.0) to build all three parts and publish a
# GitHub Release with the Flipper fap, the web bundle, and the ESP32-S2
# firmware images attached.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ESP build runs first, on the runner's system Python (which has pyserial
      # for the core's esptool elf2image step). A setup-python before this would
      # shadow it and break esptool with "No module named 'serial'".
      # AsyncTCP + ESPAsyncWebServer are vendored in esp32/libs/.
      - name: Build ESP32-S2 firmware
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | BINDIR="$HOME/bin" sh
          export PATH="$HOME/bin:$PATH"
          arduino-cli config init --overwrite
          arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.17
          arduino-cli compile \
            --fqbn esp32:esp32:esp32s2:PartitionScheme=huge_app \
            --libraries esp32/libs \
            --output-dir esp32/hotspot-arcade-fw/build \
            esp32/hotspot-arcade-fw
          # Merge the four flashable images into a single firmware-merged.bin
          # (flashable at 0x0), so the release ships one ESP image instead of four.
          BUILD=esp32/hotspot-arcade-fw/build
          BOOT_APP0="$HOME/.arduino15/packages/esp32/hardware/esp32/2.0.17/tools/partitions/boot_app0.bin"
          ESPTOOL=$(ls "$HOME/.arduino15/packages/esp32/tools/esptool_py/"*/esptool 2>/dev/null | head -1)
          "$ESPTOOL" --chip esp32s2 merge_bin -o "$BUILD/firmware-merged.bin" \
            0x1000  "$BUILD/hotspot-arcade-fw.ino.bootloader.bin" \
            0x8000  "$BUILD/hotspot-arcade-fw.ino.partitions.bin" \
            0xe000  "$BOOT_APP0" \
            0x10000 "$BUILD/hotspot-arcade-fw.ino.bin"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build web bundle
        working-directory: web
        # Zero runtime deps (Node stdlib only); install only if a lockfile exists.
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          fi
          node build.mjs
          cd dist && zip -9 ../web-bundle.zip index.html.gz manifest.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Flipper app (fap)
        run: |
          pip install --upgrade ufbt
          ufbt update --index-url=https://up.momentum-fw.dev/firmware/directory.json --channel=release --hw-target=f7
          cd flipper/hotspot-arcade && ufbt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Hotspot Arcade ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          body: |
            Offline multiplayer party games hosted from a Flipper Zero + ESP32-S2 dev board.

            ## Assets

            - `hotspot_arcade.fap`: the Flipper app (install to `/ext/apps/GPIO/`). It
              **bundles the ESP firmware**, so you can flash the board on-device — no computer needed.
            - `web-bundle.zip`: the phone game bundle; unzip into `/ext/apps_data/hotspot_arcade/web/`.
            - `firmware-merged.bin`: the ESP32-S2 firmware as a single image, for flashing from a
              computer (optional — the fap already carries it for on-device flashing).

            ## Flash the ESP32-S2 from a computer (optional)

            Download mode: hold BOOT, tap RESET, release BOOT. **Never `--erase-all` on the S2.**

            ```sh
            esptool.py --chip esp32s2 --before default_reset --after hard_reset write_flash 0x0 firmware-merged.bin
            ```

            Then tap RESET to run. Or skip this entirely and use **Install Firmware** on the Flipper.
          files: |
            flipper/hotspot-arcade/dist/hotspot_arcade.fap
            web/web-bundle.zip
            esp32/hotspot-arcade-fw/build/firmware-merged.bin
