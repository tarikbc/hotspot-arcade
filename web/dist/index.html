lign:left; font-family:var(--font);min-height:64px; border-radius:var(--radius); border:2px solid var(--line);background:var(--surface-2); color:var(--text); font-size:16px; font-weight:600;padding:10px 14px; cursor:pointer; transition:border-color .1s ease-out;}.opt .lab{width:32px; height:32px; flex:none; border:2px solid var(--line); background:var(--bg);display:grid; place-items:center; font-weight:700; color:var(--text-dim);}.opt .txt{flex:1}.opt .cnt{color:var(--text-dim); font-weight:700; font-variant-numeric:tabular-nums}.opt.mine{border-color:var(--orange)}.opt.mine .lab{background:var(--orange); color:var(--on-orange); border-color:var(--orange)}.opt.correct{border-color:var(--good)}.opt.correct .lab{background:var(--good); color:var(--on-orange); border-color:var(--good)}.opt.wrong{border-color:var(--bad)}.opt.wrong .lab{background:var(--bad); color:var(--on-orange); border-color:var(--bad)}.opt:disabled{cursor:default}.scores{display:flex; flex-wrap:wrap; gap:6px}.scores span{background:var(--surface-2); border:2px solid var(--line); border-radius:var(--radius);padding:5px 10px; font-size:12px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.04em}.scores span b{color:var(--orange)}.challenges{display:flex; flex-direction:column; gap:8px}.challenge{display:flex; align-items:center; gap:10px; background:var(--surface-2);border:2px solid var(--orange); border-radius:var(--radius); padding:10px 12px;}.challenge .pn{flex:1; font-weight:700}.turn{text-align:center; font-weight:700; padding:6px; min-height:1.4em;text-transform:uppercase; letter-spacing:.08em; color:var(--text-dim)}.turn.you{color:var(--orange)}.board{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;background:var(--surface); border:2px solid var(--line); border-radius:var(--radius);padding:6px; touch-action:manipulation; transition:opacity .1s ease-out;}.board:not(.mine){opacity:.6}.cell{aspect-ratio:1; border:2px solid var(--line); background:var(--bg); position:rela <div class="scan" aria-hidden="true"></div>
<header class="hdr">
<span class="wordmark">Hotspot Arcade<span class="cur" aria-hidden="true">&#9616;</span></span>
<span class="hdr-right">
<span id="dot" class="dot warn" title="connection"></span>
<span id="hdr-nick"></span>
</span>
</header>
<div id="netbar" class="netbar hide">Reconnecting...</div>
<section id="landing" class="screen">
<div class="brand">
<div class="pixmark" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
<p class="tag">Local multiplayer. No internet needed.</p>
</div>
<label class="field">
<span class="sub">Your nickname</span>
<input id="nick" maxlength="12" autocomplete="off" autocapitalize="off"
spellcheck="false" placeholder="e.g. Nova">
</label>
<button id="play" class="btn big">Play</button>
<a id="openbrowser" class="hint-link" href="http://192.168.4.1/">Open in browser</a>
<p class="hint">If this page closes, rejoin the WiFi and open
<b>192.168.4.1</b> in your browser.</p>
</section>
<section id="lobby" class="screen hide">
<header class="bar"><h2>Lobby</h2><span id="lobby-me" class="me"></span></header>
<div id="lobby-game" class="game-state">Waiting for the host to pick a game.</div>
<ul id="players" class="players"></ul>
</section>
<section id="trivia" class="screen hide">
<header class="bar"><h2>Trivia</h2><span id="tv-rank" class="me"></span></header>
<div id="tv-status" class="game-state hide">Get ready...</div>
<div id="tv-bar" class="timebar hide"><i></i></div>
<h3 id="tv-q" class="question"></h3>
<div id="tv-opts" class="opts"></div>
<div id="tv-scores" class="scores"></div>
</section>
<section id="c4" class="screen hide">
<header class="bar"><h2>Connect 4</h2><button id="c4-leave" class="btn ghost sm hide">Leave</button></header>
<div id="c4-lobby">
<div id="c4-incoming" class="challenges"></div>
<p class="sub">Challenge a player</p>
<ul id="c4-players" class="players"></ul>
</div>
<div id="c4-match" class="hide">
<div id="c4-turn" class="turn"></div>
<div id="c4-board" class="board"></div>
</div>
<div id="c4-over" class="hide over">
<div id="c4-result" class="result"></div>
<button id="c4-back" class="btn big">Back to lobby</button>
</div>
</section>
<div id="toast" class="toast hide"></div>
<script>"use strict";
var A = {
ws: null,
pid: null,
nick: "",
view: "landing",     // landing | lobby | trivia | c4
joined: false,       // true once the user committed a nick (Play) or is rejoining
offset: 0,           // serverMillis - localNow, learned from first timed msg
offsetSet: false,
retry: 0,
handlers: {},        // messageType -> fn(msg), filled by game modules
};
var $ = function (id) { return document.getElementById(id); };
function show(id) { $(id).classList.remove("hide"); }
function hide(id) { $(id).classList.add("hide"); }
function esc(s) {
return String(s == null ? "" : s).replace(/[&<>"]/g, function (c) {
return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c];
});
}
function screen(name) {
A.view = name;
["landing", "lobby", "trivia", "c4"].forEach(function (s) {
$(s).classList.toggle("hide", s !== name);
});
}
function route(name) { if (A.joined) screen(name); }
function serverNow() { return Date.now() + A.offset; }
function noteDeadline(deadline, dur) {
if (!A.offsetSet && deadline && dur) {
A.offset = (deadline - dur) - Date.now();
A.offsetSet = true;
}
}
var toastTimer;
function toast(msg) {
var el = $("toast");
el.textContent = msg;
el.classList.remove("hide");
clearTimeout(toastTimer);
toastTimer = setTimeout(function () { el.classList.add("hide"); }, 2600);
}
function send(obj) {
if (A.ws && A.ws.readyState === 1) A.ws.send(JSON.stringify(obj));
}
function setDot(cls) { $("dot").className = "dot" + (cls ? " " + cls : ""); }
function setNick() { $("hdr-nick").textContent = A.nick || ""; }
function wsUrl() {
var proto = location.protocol === "https:" ? "wss:" : "ws:";
var host = location.host || "192.168.4.1";
return proto + "//" + host + "/ws";
}
function connect() {
var ws;
try { ws = new WebSocket(wsUrl()); }
catch (e) { scheduleReconnect(); return; }
A.ws = ws;
ws.onopen = function () {
A.retry = 0;
hide("netbar");
setDot("");           // connected
if (A.joined) send({ t: "hello", nick: A.nick });
};
ws.onmessage = function (ev) {
var m;
try { m = JSON.parse(ev.data); } catch (e) { return; }
dispatch(m);
};
ws.onclose = function () { scheduleReconnect(); };
ws.onerror = function () { try { ws.close(); } catch (e) {} };
}
function scheduleReconnect() {
setDot(A.retry > 4 ? "bad" : "warn");   // down after repeated failures
if (A.view !== "landing") {
$("netbar").textContent = "Reconnecting...";
show("netbar");
}
var wait = Math.min(1000 * Math.pow(1.6, A.retry), 8000);
A.retry++;
setTimeout(connect, wait);
}
function dispatch(m) {
switch (m.t) {
case "welcome":
A.pid = m.pid;
if (m.nick) { A.nick = m.nick; setNick(); }
break;
case "lobby":
onLobby(m);
break;
case "toast":
toast(m.msg);
break;
case "pong":
break;
default:
if (A.handlers[m.t]) A.handlers[m.t](m);
}
}
function onLobby(m) {
if (m.me) A.pid = m.me;
A.players = m.players || [];   // kept for the Connect 4 challenge list
$("lobby-me").textContent = A.nick ? "You: " + A.nick : "";
var list = $("players");
list.innerHTML = "";
(m.players || []).forEach(function (p) {
var li = document.createElement("li");
if (p.pid === A.pid) li.className = "self";
li.innerHTML =
'<span class="dot"></span>' +
'<span class="pn">' + esc(p.nick) + "</span>" +
'<span class="ps">' + (p.score || 0) + "</span>";
list.appendChild(li);
});
var g = m.game || "none";
var gs = $("lobby-game");
if (g === "none") {
gs.textContent = "Waiting for the host to pick a game.";
} else {
gs.textContent = (g === "trivia" ? "Trivia" : "Connect 4") + " starting...";
}
if (g === "none" && A.view !== "landing") route("lobby");
else if (g !== "none" && A.view === "lobby") {
route(g === "trivia" ? "trivia" : "c4");
}
}
function startPlay() {
var n = $("nick").value.trim().slice(0, 12);
if (!n) { $("nick").focus(); return; }
A.nick = n;
A.joined = true;
setNick();
try { localStorage.setItem("ha_nick", n); } catch (e) {}
send({ t: "hello", nick: n });
screen("lobby");
}
function initApp() {
var saved = "";
try { saved = localStorage.getItem("ha_nick") || ""; } catch (e) {}
A.nick = saved;
A.joined = !!saved;   // returning player: rejoin automatically on connect
$("nick").value = saved;
setNick();
setDot("warn");       // not connected yet
$("play").addEventListener("click", startPlay);
$("nick").addEventListener("keydown", function (e) {
if (e.key === "Enter") startPlay();
});
connect();
setInterval(function () { send({ t: "ping" }); }, 20000);
}
document.addEventListener("DOMContentLoaded", initApp);
(function () {
var LABELS = ["A", "B", "C", "D"];
var last = null;      // last trivia message, so scores render across phases
var barAnim = null;
function rank(scores) {
if (!scores || !scores.length) return "";
var sorted = scores.slice().sort(function (a, b) { return b.score - a.score; });
var me = sorted.findIndex(function (s) { return s.pid === A.pid; });
var mine = A.pid != null ? scores.find(function (s) { return s.pid === A.pid; }) : null;
if (me < 0) return "";
return "#" + (me + 1) + " of " + sorted.length + " . " + (mine ? mine.score : 0) + " pts";
}
function runBar(deadline, dur) {
var bar = $("tv-bar"), fill = bar.firstElementChild;
if (barAnim) { clearTimeout(barAnim); barAnim = null; }
show("tv-bar");
var remain = deadline - serverNow();
bar.classList.remove("hot");
if (remain <= 0 || !dur) { fill.style.transition = "none"; fill.style.transform = "scaleX(0)"; bar.classList.add("hot"); return; }
var frac = Math.max(0, Math.min(1, remain / dur));
fill.style.transition = "none";
fill.style.transform = "scaleX(" + frac + ")";
requestAnimationFrame(function () {
fill.style.transition = "transform " + remain + "ms linear";
fill.style.transform = "scaleX(0)";
});
if (remain <= 3000) bar.classList.add("hot");
else barAnim = setTimeout(function () { bar.classList.add("hot"); }, remain - 3000);
}
function render(m) {
route("trivia");
if (A.view !== "trivia") return;   // still on landing; render when joined
var status = $("tv-status"), q = $("tv-q"), opts = $("tv-opts");
if (m.phase === "idle") {
status.textContent = "Get ready...";
show("tv-status"); hide("tv-bar");
q.textContent = ""; opts.innerHTML = "";
$("tv-rank").textContent = rank(m.scores);
return;
}
hide("tv-status");
q.textContent = m.q || "";
$("tv-rank").textContent = rank(m.scores);
var reveal = m.phase === "reveal";
var counts = m.counts || [];
var mine = (typeof m.mine === "number") ? m.mine : -1;
var picked = mine >= 0;
if (reveal) { hide("tv-bar"); }
else { noteDeadline(m.deadline, m.dur); runBar(m.deadline, m.dur); }
opts.innerHTML = "";
(m.o || []).forEach(function (text, i) {
var b = document.createElement("button");
b.className = "opt";
var cls = [];
if (reveal) {
if (i === m.correct) cls.push("correct");
else if (i === mine) cls.push("wrong");
} else if (i === mine) {
cls.push("mine");
}
if (cls.length) b.className += " " + cls.join(" ");
if (reveal || picked) b.disabled = true;
var cnt = reveal ? ('<span class="cnt">' + (counts[i] || 0) + "</span>") : "";
b.innerHTML =
'<span class="lab">' + LABELS[i] + "</span>" +
'<span class="txt">' + esc(text) + "</span>" + cnt;
b.addEventListener("click", function () {
if (b.disabled) return;
send({ t: "answer", c: i });
Array.prototype.forEach.call(opts.children, function (c) { c.disabled = true; });
b.classList.add("mine");
});
opts.appendChild(b);
});
}
A.handlers.trivia = function (m) { last = m; render(m); };
})();
(function () {
var COLS = 7, ROWS = 6;
var prev = null;      // previous board, to animate only the newly dropped disc
function otherPlayers() {
return (A.players || []).filter(function (p) { return p.pid !== A.pid; });
}
function renderLobby(m) {
hide("c4-match"); hide("c4-over"); show("c4-lobby");
hide("c4-leave");
var challenges = m.challenges || [];
var inc = $("c4-incoming");
inc.innerHTML = "";
challenges.forEach(function (c) {
var row = document.createElement("div");
row.className = "challenge";
if (c.to === A.pid) {
row.innerHTML = '<span class="pn">' + esc(nickOf(c.from)) + " challenged you</span>";
add(row, "Accept", "btn sm", function () { send({ t: "accept", from: c.from }); });
add(row, "Decline", "btn ghost sm", function () { send({ t: "cancel" }); });
} else if (c.from === A.pid) {
row.innerHTML = '<span class="pn">Waiting on ' + esc(nickOf(c.to)) + "...</span>";
add(row, "Cancel", "btn ghost sm", function () { send({ t: "cancel" }); });
} else { return; }
inc.appendChild(row);
});
var iChallenged = challenges.some(function (c) { return c.from === A.pid; });
var list = $("c4-players");
list.innerHTML = "";
var others = otherPlayers();
if (!others.length) {
var li = document.createElement("li");
li.innerHTML = '<span class="pn" style="color:var(--dim)">No other players yet.</span>';
list.appendChild(li);
}
others.forEach(function (p) {
var li = document.createElement("li");
li.innerHTML = '<span class="dot"></span><span class="pn">' + esc(p.nick) + "</span>";
var pending = challenges.some(function (c) {
return (c.from === A.pid && c.to === p.pid) || (c.from === p.pid && c.to === A.pid);
});
var b = add(li, pending ? "Pending" : "Challenge", "btn sm", function () {
send({ t: "challenge", to: p.pid });
});
if (pending || iChallenged) b.disabled = true;
list.appendChild(li);
});
}
function nickOf(pid) {
var p = (A.players || []).find(function (x) { return x.pid === pid; });
return p ? p.nick : "Player";
}
function add(parent, label, cls, fn) {
var b = document.createElement("button");
b.className = cls; b.textContent = label;
b.addEventListener("click", fn);
parent.appendChild(b);
return b;
}
function renderPlaying(m) {
hide("c4-lobby"); hide("c4-over"); show("c4-match"); show("c4-leave");
var myTurn = m.turn === m.you;
var turn = $("c4-turn");
turn.textContent = myTurn ? "Your turn" : (esc(m.opp || "Opponent") + "'s turn");
turn.className = "turn" + (myTurn ? " you" : "");
var board = $("c4-board");
board.className = "board" + (myTurn ? " mine" : "");
var b = m.board || [];
var changed = board.childElementCount !== COLS * ROWS;
if (changed) board.innerHTML = "";
for (var i = 0; i < COLS * ROWS; i++) {
var cell = changed ? document.createElement("div") : board.children[i];
